<!DOCTYPE html>
<html lang="en" data-theme="pastel">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>PeerCodex - Student Collaboration Platform</title>

        <!-- Google Fonts - Inter -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

        <!-- Tailwind CSS + daisyUI -->
        <script src="https://cdn.tailwindcss.com"></script>
        <link href="https://cdn.jsdelivr.net/npm/daisyui@4.4.19/dist/full.min.css" rel="stylesheet" type="text/css" />

        <!-- Heroicons for icons -->
        <script src="https://unpkg.com/heroicons@2.0.18/24/outline/index.js" type="module"></script>

        <link rel="stylesheet" href="styles.css" />
    </head>
    <body class="font-inter bg-base-100">
        <div class="drawer lg:drawer-open">
            <input id="drawer-toggle" type="checkbox" class="drawer-toggle" />

            <!-- Main Content -->
            <div class="drawer-content flex flex-col">
                <!-- Mobile Navbar -->
                <div class="navbar lg:hidden bg-base-100 shadow-sm border-b border-base-200">
                    <div class="flex-none">
                        <label for="drawer-toggle" class="btn btn-square btn-ghost">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                            </svg>
                        </label>
                    </div>
                    <div class="flex-1">
                        <span class="text-xl font-semibold text-primary">PeerCodex</span>
                    </div>
                </div>

                <!-- Page Content -->
                <main class="flex-1 p-4 lg:p-8">
                    <div id="app" class="transition-all duration-300 ease-in-out">
                        <!-- Content will be dynamically loaded here -->
                    </div>
                </main>
            </div>

            <!-- Sidebar -->
            <div class="drawer-side">
                <label for="drawer-toggle" class="drawer-overlay"></label>
                <aside class="w-64 min-h-full bg-base-200/50 backdrop-blur-sm border-r border-base-300">
                    <!-- Logo -->
                    <div class="p-6 border-b border-base-300">
                        <h1 class="text-2xl font-bold text-primary">PeerCodex</h1>
                        <p class="text-sm text-base-content/70 mt-1">Student Collaboration</p>
                    </div>

                    <!-- Navigation -->
                    <nav class="p-4">
                        <ul class="menu menu-vertical space-y-2">
                            <li>
                                <a href="/dashboard" class="nav-link group" data-route="dashboard">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 7v10a2 2 0 002 2h14a2 2 0 002-2V9a2 2 0 00-2-2H5a2 2 0 00-2-2z"></path>
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 5a2 2 0 012-2h4a2 2 0 012 2v6a2 2 0 01-2 2H10a2 2 0 01-2-2V5z"></path>
                                    </svg>
                                    Dashboard
                                </a>
                            </li>
                            <li>
                                <a href="/marketplace" class="nav-link group" data-route="marketplace">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"></path>
                                    </svg>
                                    Marketplace
                                </a>
                            </li>
                            <li>
                                <a href="/forum" class="nav-link group" data-route="forum">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 8h2a2 2 0 012 2v6a2 2 0 01-2 2h-2v4l-4-4H9a2 2 0 01-2-2v-6a2 2 0 012-2h8z"></path>
                                    </svg>
                                    Forum
                                </a>
                            </li>
                            <li>
                                <a href="/mentor" class="nav-link group" data-route="mentor">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path
                                            stroke-linecap="round"
                                            stroke-linejoin="round"
                                            stroke-width="2"
                                            d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197m13.5-9a2.5 2.5 0 11-5 0 2.5 2.5 0 015 0z"
                                        ></path>
                                    </svg>
                                    Mentorship
                                </a>
                            </li>
                            <li>
                                <a href="/profile" class="nav-link group" data-route="profile">
                                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                                    </svg>
                                    Profile
                                </a>
                            </li>
                        </ul>
                    </nav>

                    <!-- User Info -->
                    <div class="absolute bottom-4 left-4 right-4">
                        <div class="bg-base-100 rounded-lg p-4 shadow-sm border border-base-300">
                            <div class="flex items-center space-x-3">
                                <div class="avatar">
                                    <div class="w-10 rounded-full bg-primary/20">
                                        <svg class="w-6 h-6 text-primary m-2" fill="currentColor" viewBox="0 0 24 24">
                                            <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                                        </svg>
                                    </div>
                                </div>
                                <div class="flex-1 min-w-0">
                                    <p class="text-sm font-medium text-base-content truncate">Alex Student</p>
                                    <p class="text-xs text-base-content/60 truncate">Computer Science</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </aside>
            </div>
        </div>

        <script src="app.js"></script>
    </body>
</html>
